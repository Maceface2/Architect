<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400" fill="none">

  <!-- left leg: bottom-left to top-right apex -->
  <line x1="40"  y1="360" x2="360" y2="40"  stroke="#58A6FF" stroke-width="14" stroke-linecap="round"/>
  <!-- base: bottom-left to bottom-mid -->
  <line x1="40"  y1="360" x2="200" y2="360" stroke="#58A6FF" stroke-width="14" stroke-linecap="round"/>
  <!-- right leg: bottom-mid to top-right apex -->
  <line x1="200" y1="360" x2="360" y2="40"  stroke="#58A6FF" stroke-width="14" stroke-linecap="round"/>

  <!-- corner joint nodes -->
  <circle cx="40"  cy="360" r="14" fill="#58A6FF"/>
  <circle cx="200" cy="360" r="14" fill="#58A6FF"/>
  <circle cx="360" cy="40"  r="14" fill="#58A6FF"/>

</svg>
